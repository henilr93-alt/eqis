<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="eqBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0071E3"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="eqAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="eqShield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0071E3"/>
      <stop offset="50%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Shield icon -->
  <g transform="translate(8, 6)">
    <!-- Shield body -->
    <path d="M 34 4 L 60 14 L 60 38 Q 60 56 34 68 Q 8 56 8 38 L 8 14 Z"
      fill="url(#eqShield)" stroke="none"/>
    <!-- Inner shield highlight -->
    <path d="M 34 10 L 54 18 L 54 37 Q 54 52 34 62 Q 14 52 14 37 L 14 18 Z"
      fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

    <!-- Circuit lines inside shield -->
    <g stroke="rgba(255,255,255,0.5)" stroke-width="1.2" fill="none" stroke-linecap="round">
      <path d="M 22 28 L 30 28 L 34 24 L 38 28 L 46 28"/>
      <path d="M 26 36 L 34 36 L 38 32"/>
      <path d="M 22 44 L 28 44 L 34 38 L 40 44 L 46 44"/>
      <path d="M 30 50 L 34 46 L 38 50"/>
    </g>
    <!-- Circuit dots -->
    <g fill="rgba(255,255,255,0.9)">
      <circle cx="22" cy="28" r="2"/>
      <circle cx="46" cy="28" r="2"/>
      <circle cx="34" cy="24" r="1.5"/>
      <circle cx="26" cy="36" r="1.8"/>
      <circle cx="38" cy="32" r="1.5"/>
      <circle cx="22" cy="44" r="2"/>
      <circle cx="46" cy="44" r="2"/>
      <circle cx="34" cy="38" r="2.2"/>
      <circle cx="34" cy="46" r="1.5"/>
    </g>

    <!-- Central check mark -->
    <path d="M 28 36 L 33 42 L 44 28" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0"/>

    <!-- Pulse wave at bottom of shield -->
    <path d="M 18 54 L 26 54 L 29 48 L 32 58 L 36 46 L 39 56 L 42 54 L 50 54"
      stroke="rgba(255,255,255,0.7)" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- EQIS wordmark -->
  <text x="82" y="50" fill="url(#eqBg)" font-size="42" font-weight="900"
    font-family="'SF Pro Display', 'Inter', 'Segoe UI', Arial, sans-serif"
    letter-spacing="3">EQIS</text>

  <!-- Tagline -->
  <text x="84" y="68" fill="#6B7280" font-size="10.5" font-weight="600"
    font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
    letter-spacing="2.5">QA INTELLIGENCE SYSTEM</text>

  <!-- Accent bar under wordmark -->
  <rect x="82" y="54" width="60" height="2" rx="1" fill="url(#eqAccent)" opacity="0.7"/>

  <!-- Small "by Etrav Tech" -->
  <text x="248" y="68" fill="#9CA3AF" font-size="8.5" font-weight="500"
    font-family="'SF Pro Text', 'Inter', Arial, sans-serif"
    letter-spacing="0.5">by Etrav Tech</text>
</svg>
